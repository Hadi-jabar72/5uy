<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Racer</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#222;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#game{
position:relative;
width:400px;
height:700px;
background:#555;
overflow:hidden;
border:5px solid white;
}

.road-line{
position:absolute;
width:10px;
height:80px;
background:white;
left:195px;
}

.car{
position:absolute;
width:60px;
height:110px;
background:red;
border-radius:10px;
bottom:20px;
left:170px;
}

.enemy{
position:absolute;
width:60px;
height:110px;
background:yellow;
border-radius:10px;
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:24px;
font-weight:bold;
z-index:10;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
font-size:24px;
cursor:pointer;
z-index:20;
}
</style>

</head>
<body>

<div id="game">

<div id="score">Score: 0</div>

<button id="start">Start Game</button>

<div class="car" id="player"></div>

</div>

<script>

const game=document.getElementById("game");
const player=document.getElementById("player");
const scoreBoard=document.getElementById("score");
const startBtn=document.getElementById("start");

let keys={};
let enemies=[];
let score=0;
let speed=5;
let playing=false;

document.addEventListener("keydown",(e)=>{
keys[e.key]=true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key]=false;
});

function createLines(){

for(let i=0;i<10;i++){

let line=document.createElement("div");
line.className="road-line";
line.style.top=(i*90)+"px";
game.appendChild(line);

}

}

createLines();

function moveLines(){

document.querySelectorAll(".road-line").forEach(line=>{

let top=parseInt(line.style.top);

top+=speed;

if(top>700) top=-80;

line.style.top=top+"px";

});

}

function createEnemy(){

let enemy=document.createElement("div");

enemy.className="enemy";

enemy.style.left=(Math.floor(Math.random()*3)*110+30)+"px";

enemy.style.top="-120px";

game.appendChild(enemy);

enemies.push(enemy);

}

function moveEnemies(){

enemies.forEach((enemy,index)=>{

let top=parseInt(enemy.style.top);

top+=speed;

enemy.style.top=top+"px";

if(checkCollision(player,enemy)){
playing=false;
startBtn.innerHTML="Game Over<br>Restart";
startBtn.style.display="block";
}

if(top>700){

enemy.remove();
enemies.splice(index,1);

score++;
scoreBoard.innerHTML="Score: "+score;

if(score%10==0) speed++;

}

});

if(Math.random()<0.03){
createEnemy();
}

}

function checkCollision(a,b){

let ar=a.getBoundingClientRect();

let br=b.getBoundingClientRect();

return !(
ar.bottom<br.top||
ar.top>br.bottom||
ar.right<br.left||
ar.left>br.right
);

}

function movePlayer(){

let left=player.offsetLeft;

if(keys["ArrowLeft"]&&left>20)
left-=7;

if(keys["ArrowRight"]&&left<320)
left+=7;

player.style.left=left+"px";

}

function gameLoop(){

if(!playing) return;

moveLines();
movePlayer();
moveEnemies();

requestAnimationFrame(gameLoop);

}

startBtn.onclick=function(){

document.querySelectorAll(".enemy").forEach(e=>e.remove());

enemies=[];

score=0;
speed=5;

scoreBoard.innerHTML="Score: 0";

player.style.left="170px";

playing=true;

startBtn.style.display="none";

gameLoop();

}

</script>

</body>
</html>
